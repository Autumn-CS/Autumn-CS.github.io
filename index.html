<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属于你｜限定浪漫</title>
    <style>
        *{margin:0;padding:0;}
        body{
            min-height: 100vh;
            background: #fff5f8;
            text-align: center;
            font-family: "微软雅黑",sans-serif;
            color: #444;
            padding-top: 120px;
        }
        h1{
            color: #e85a7a;
            font-size: 32px;
            margin-bottom: 30px;
        }
        p{
            font-size: 18px;
            line-height: 2.2;
        }
        .heart{
            color: #e85a7a;
            font-size: 40px;
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <h1>以域名为名，赠你专属温柔</h1>
    <div class="heart">❤</div>
    <p>这世上有千千万万个域名</p>
    <p>但这一个，只属于你</p>
    <p>山河万里，偏爱是你</p>
    <p>岁岁年年，皆为你</p>
</body>
</html>
