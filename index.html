<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>аё…е–өе–өжҳҹзҗғ В· еҸӘеұһдәҺдҪ аё…</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            width:100vw;
            min-height:100vh;
            background:#ffe6f0;
            text-align:center;
            font-family:"еҫ®иҪҜйӣ…й»‘",sans-serif;
            overflow-x:hidden;
            position:relative;
        }

        .hearts{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events:none;
            z-index:-1;
            background:url('https://i.imgur.com/0fPuHJL.gif') repeat;
            opacity:0.85;
        }

        .container{
            max-width:700px;
            margin:0 auto;
            padding:60px 20px;
            position:relative;
            z-index:10;
        }

        h1{
            font-size:34px;
            color:#e64384;
            margin-bottom:10px;
        }

        .typewriter{
            font-size:24px;
            color:#d6336c;
            margin:25px 0;
            white-space:nowrap;
            overflow:hidden;
            border-right:3px solid #d6336c;
            width:0;
            animation: typing 1.5s steps(10) forwards, blink 0.7s infinite;
        }
        @keyframes typing{to{width:100%;}}
        @keyframes blink{50%{border-color:transparent;}}

        .slideshow{
            width:100%;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 0 25px rgba(230,67,132,0.25);
            margin:30px 0;
        }
        .slides{
            display:flex;
            transition:transform 0.9s ease;
        }
        .slide{
            min-width:100%;
        }
        .slide img{
            width:100%;
            display:block;
            border-radius:12px;
        }

        audio{display:none;}
    </style>
</head>

<body>
    <div class="hearts"></div>
    <div class="container">
        <h1>е–өе‘ңпҪһж¬ўиҝҺжқҘеҲ°жҲ‘зҡ„е°Ҹжҳҹзҗғ</h1>
        <div class="typewriter">(в—•Пүв—•вңҝ) е’Әе’Әе–өе–өе’Әе’Әе–өпјҒ(в—ҸвҖІПү`в—Ҹ)аё… </div>

        <div class="slideshow">
            <div class="slides">
                <div class="slide"><img src="01.jpg"></div>
                <div class="slide"><img src="02.jpg"></div>
                <div class="slide"><img src="03.jpg"></div>
                <div class="slide"><img src="04.jpg"></div>
                <div class="slide"><img src="05.jpg"></div>
                <div class="slide"><img src="06.jpg"></div>
                <div class="slide"><img src="07.jpg"></div>
                <div class="slide"><img src="08.jpg"></div>
                <div class="slide"><img src="09.jpg"></div>
                <div class="slide"><img src="10.jpg"></div>
                <div class="slide"><img src="11.jpg"></div>
                <div class="slide"><img src="12.jpg"></div>
                
            </div>
        </div>
    </div>

    <audio autoplay loop>
        <source src="https://music.163.com/song/media/outer/url?id=3332136612.mp3" type="audio/mpeg">
    </audio>

    <script>
        let s = document.querySelector('.slides');
        let i = 0;
        setInterval(()=>{
            i=(i+1)%13;
            s.style.transform=`translateX(-${i*100}%)`;
        }, 1300); // жӣҙеҝ«пјҡ1.3з§’еҲҮжҚўдёҖеј 
    </script>
</body>
</html>
